<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Übersicht der Veranstaltungen der ESGÖ (extern)</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="site-header">
        <a class="brand" href="#top" aria-label="Zur Startseite">
          <div class="brand-logo">
            <img src="edithstein_cover.jpg" alt="Cover Foto"/>
        </div>
        </a>
    <div class="container header-inner">
      <div class="header-actions">
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="main-navigation" aria-label="Menü öffnen">
          <span></span>
          <span></span>
          <span></span>
        </button>
                <button class="font-decrease theme-toggle" type="button" data-font-decrease aria-label="Schriftgröße verkleinern">
    A-
  </button>
  <button class="font-reset theme-toggle" type="button" data-font-reset aria-label="Schriftgröße zurücksetzen">
    A
  </button>
  <button class="font-increase theme-toggle" type="button" data-font-increase aria-label="Schriftgröße vergrößern">
    A+
  </button>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Farbschema wechseln">
          <span class="theme-toggle__icon" aria-hidden="true">◐</span>
        </button>
      </div>
      </header>
<main>
  <section id="section-table-nav">
  <div id="table-nav"></div>
  </section>
  <section id="events">
  <div id="test">
    <table>
      <thead id="thead" class="theadstyle"></thead>
      <tbody id="tbody" class="tbodystyle"></tbody>
    </table>
  </div>
</section>
</main>
    <script>
      "use strict";
      let data;
      let dataHeaders;
      let test = document.querySelector("#test");
      let thead = document.querySelector("#thead");
      let tbody = document.querySelector("#tbody");
      let th;
      let txt;
      let url = "veranstaltungen_2021-2026_extern.json";

      async function loadData() {
        let resp = await fetch(url);
        data = await resp.json();
        //Array der Objekt-Schlüsselworte
        dataHeaders = Object.keys(data[1]);
        console.log(dataHeaders);
      }
      function displayHeaders() {
        txt = "";
        txt += "<tr>";
        dataHeaders.forEach((element) => {
          txt += `<th data-prop="${element}">${element}</th>`;
        });
        txt += "</tr>";
        thead.innerHTML = txt;
      }

      function displayData() {
        txt = "";
        //Zeile für Zeile
        data.forEach((item) => {
          txt += "<tr>";
          //Spalte für Spalte
          dataHeaders.forEach((element) => {
            txt += `<td>${item[element]}</td>`;
          });
          txt += "</tr>";
        });
        tbody.innerHTML = txt;
      }

      //function sorry() {
      //  test.innerHTML = "tut uns leid";
      //}

      loadData()
        .then(displayHeaders)
        .then(displayData)
        //.then(actions)
        .catch(sorry);
    </script>
  </body>
</html>
